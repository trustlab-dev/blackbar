# Promtail Configuration for BlackBar
# Collects logs from Docker containers and ships to Loki

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Docker container logs
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Only collect logs from blackbar containers
      - source_labels: ['__meta_docker_container_name']
        regex: '/(blackbar.*|backend|frontend|admin-backend|admin-frontend|mongodb|traefik)'
        action: keep
      
      # Use container name as job label
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      
      # Add container ID
      - source_labels: ['__meta_docker_container_id']
        target_label: 'container_id'
      
      # Add image name
      - source_labels: ['__meta_docker_container_image']
        target_label: 'image'

    pipeline_stages:
      # Try to parse JSON logs (structured logging)
      - json:
          expressions:
            level: level
            message: message
            timestamp: timestamp
            correlation_id: correlation_id
            tenant_id: tenant_id
            user_id: user_id
            service: service
      
      # Extract labels from parsed JSON
      - labels:
          level:
          correlation_id:
          tenant_id:
          service:
      
      # Set timestamp from log if available
      - timestamp:
          source: timestamp
          format: RFC3339Nano
          fallback_formats:
            - RFC3339
            - UnixMs
      
      # Handle non-JSON logs (fallback)
      - match:
          selector: '{container=~".+"} |~ ".*"'
          stages:
            - regex:
                expression: '(?P<level>DEBUG|INFO|WARNING|ERROR|CRITICAL)'
            - labels:
                level:

  # System logs (optional)
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: system
          __path__: /var/log/syslog
