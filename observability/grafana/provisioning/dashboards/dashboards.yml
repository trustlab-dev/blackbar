# Grafana Dashboard Provisioning
apiVersion: 1

providers:
  - name: 'BlackBar Dashboards'
    orgId: 1
    folder: 'BlackBar'
    folderUid: 'blackbar'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/json
