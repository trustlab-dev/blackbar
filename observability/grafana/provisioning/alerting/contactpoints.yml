# Grafana Contact Points Configuration
# RFC-009: System Monitoring and Observability
#
# Email-based alerting (Phase 1)
# Slack/PagerDuty marked as future enhancements

apiVersion: 1

contactPoints:
  # Primary email contact point for all alerts
  - orgId: 1
    name: email-ops
    receivers:
      - uid: email-ops-1
        type: email
        settings:
          addresses: ops@blackbar.app
          singleEmail: false
        disableResolveMessage: false

  # Critical alerts - immediate notification
  - orgId: 1
    name: email-critical
    receivers:
      - uid: email-critical-1
        type: email
        settings:
          addresses: ops@blackbar.app
          singleEmail: false
        disableResolveMessage: false

  # ============================================
