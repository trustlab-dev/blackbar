name: backend-ci

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    working-directory: backend

jobs:
  lint:
    name: Lint (ruff + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            backend/pyproject.toml
            backend/requirements.txt

      - name: Install dev deps
        run: pip install -e ".[dev]"

      - name: ruff check
        run: ruff check src tests

      - name: black --check
        run: black --check src tests

  type-check:
    name: Type-check (mypy)
    runs-on: ubuntu-latest
    # mypy has a ~210-error backlog against the existing code (tracked for
    # follow-up). Surface the findings without blocking the merge gate until
    # the backlog is cleared.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            backend/pyproject.toml
            backend/requirements.txt

      - name: Install dev deps
        run: pip install -e ".[dev]"

      - name: mypy
        run: mypy src

  test:
    name: Tests + coverage
    runs-on: ubuntu-latest
    # Docker is available on ubuntu-latest runners; testcontainers spins up
    # the Mongo container itself. No service container needed here.
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            backend/pyproject.toml
            backend/requirements.txt

      - name: Install dev deps
        run: pip install -e ".[dev]"

      - name: Run pytest
        env:
          JWT_SECRET: ci-only-throwaway-jwt-secret-please-do-not-reuse
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: |
          pytest -m "not slow" \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-xml
          path: backend/coverage.xml
          if-no-files-found: warn
          retention-days: 14

      # TBD: enable Codecov upload once the new `blackbar` GitHub org configures
      # ${{ secrets.CODECOV_TOKEN }}. Until then the XML lives as a workflow
      # artifact for manual inspection.
      # - name: Upload to Codecov
      #   if: ${{ secrets.CODECOV_TOKEN }}
      #   uses: codecov/codecov-action@v4
      #   with:
      #     token: ${{ secrets.CODECOV_TOKEN }}
      #     files: backend/coverage.xml
      #     flags: backend

  security-scan:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      # Fail on HIGH or CRITICAL CVEs. Advisories that the maintainers have
      # reviewed and accepted should be added with `--ignore-vuln GHSA-...`
      # arguments and documented in KNOWN_ISSUES.md.
      - name: pip-audit
        run: pip-audit --requirement requirements.txt --strict
