name: container

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    paths:
      - "backend/Dockerfile"
      - "frontend/Dockerfile"
      - "docker-compose*.yml"
      - ".github/workflows/container.yml"
  workflow_dispatch:

concurrency:
  group: container-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write   # required by publish job to push to GHCR

env:
  # TBD: the `blackbar` GitHub org doesn't exist yet (audit Q1). When the
  # org is created the operator should mirror this prefix in any external
  # registry config. The publish job pushes to GHCR by default — change to
  # docker.io or another registry by updating REGISTRY here.
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  build-backend:
    name: Build backend image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (no push)
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile
          push: false
          tags: blackbar-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

  build-frontend:
    name: Build frontend image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image (no push)
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile
          push: false
          tags: blackbar-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  publish:
    name: Publish images (tag push only)
    needs: [build-backend, build-frontend]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tags
        id: tags
        run: |
          VERSION="${GITHUB_REF##refs/tags/}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Log in to ${{ env.REGISTRY }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/blackbar-backend:${{ steps.tags.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/blackbar-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/blackbar-frontend:${{ steps.tags.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/blackbar-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
