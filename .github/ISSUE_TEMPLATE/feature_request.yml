name: Feature request
description: Propose a new capability or enhancement
title: "[feat]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing a feature. The questions below help us scope the work and prioritize against the FOI workflow roadmap.

  - type: checkboxes
    id: prereqs
    attributes:
      label: Pre-flight checklist
      options:
        - label: I have searched [existing issues](https://github.com/trustlab-dev/blackbar/issues) and Discussions and this is not a duplicate.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / use-case
      description: What are you trying to accomplish? What is the user-visible pain point today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you would like to see. UI sketches and API shapes welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you have evaluated, and why they fall short.
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Is this an FOI-workflow need or a generic feature?
      description: FOI-workflow needs (intake, redaction, release) are higher priority than generic platform features.
      options:
        - FOI workflow (intake / redaction / approval / release)
        - Generic platform (auth / admin / observability / UX)
        - Integration with an external system
        - Not sure
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Links, mockups, similar features in other tools, etc.
    validations:
      required: false
